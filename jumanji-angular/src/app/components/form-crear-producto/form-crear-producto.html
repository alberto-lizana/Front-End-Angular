<!-- FORMULARIO CREAR PRODUCTO -->
<form class="carta-body-juego" [formGroup]="form" (ngSubmit)="submit()">
   
    <!-- NOMBRE -->
    <div class="row">
        <div class="col-12">
            <label for="nombre" class="form-label letra-normal letra-normal-bold col-12">Nombre</label>
            <input type="text"  formControlName="nombre" class="input-transparente letra-normal w-100 mb-3" placeholder="Nombre">
        </div>
    </div>

    <!-- IMAGEN -->
    <div class=" row">
        <div class="col-12">
            <label for="imagen" class="form-label letra-normal letra-normal-bold col-12">Imagen</label>
            <input type="text"  formControlName="imagen" class="input-transparente letra-normal w-100 mb-3" placeholder="imagen">
        </div>
    </div>

    <!-- DESCRIPCIÓN -->
    <div class="row ">
        <div class="col-12">
            <label for="descripcion" class="form-label letra-normal letra-normal-bold ">Descripción</label>
            <input type="text" formControlName="descripcion" class="input-transparente letra-normal w-100 mb-3" placeholder="descripcion">
        </div>
    </div>

    <!-- CATEGORÍA -->
    <select formControlName="categoria" class="form-label letra-normal letra-normal-bold w-100 input-transparente mb-3">
        <option value="ESTRATEGIA">Estrategia</option>
        <option value="COOPERATIVO">Cooperativos</option>
        <option value="ROL">Rol</option>
        <option value="CASUAL">Casual</option>
    </select>

    <div class="row">
        <!-- PRECIO -->
        <div class="col-6">
            <label for="precio" class="form-label letra-normal letra-normal-bold">Precio</label>
            <input type="number" formControlName="precio" class="input-transparente letra-normal w-100 mb-3" placeholder="15990">
        </div>

        <!-- DESCUENTO -->
        <div class="col-6">
            <label for="descuento" class="form-label letra-normal letra-normal-bold">Descuento</label>
            <input type="number" formControlName="descuento" class="input-transparente letra-normal w-100 mb-3" placeholder="0.15">
        </div>
    </div>

    <div class="row">

        <!-- JUGADORES -->
        <div class="col-6">
            <label for="cantidadJugadores" class="form-label letra-normal letra-normal-bold">Jugadores</label>
            <input type="text" formControlName="cantidadJugadores" class="input-transparente letra-normal w-100 mb-3" placeholder="2-6">
        </div>

        <!-- DURACIÓN -->
        <div class="col-6">
            <label for="duracion" class="form-label letra-normal letra-normal-bold">Duración</label>
            <input type="text" formControlName="duracion" class="input-transparente letra-normal w-100 mb-3" placeholder="60-120 MIN">
        </div>

    </div>

    <div class="row">
        
        <!-- STOCK -->
        <div class="col-6">
            <label for="stock" class="form-label letra-normal letra-normal-bold">Stock</label>
            <input type="number" formControlName="stock" class="input-transparente letra-normal w-100 mb-3" placeholder="1">
        </div>

        <!-- DIFICULTAD -->
        <div class="col-6">
            <label for="dificultad" class="form-label letra-normal letra-normal-bold">Dificultad</label>
            <input type="number" formControlName="dificultad" class="input-transparente letra-normal w-100 mb-4" placeholder="1">
        </div>

    </div>

    <!-- BOTONES -->
    <div class="row-12 text-center mb-2">
        <button type="submit" class="btn-bd-primary letra-normal p-2 w-100 d-block text-center">
            Crear
        </button>
    </div>
    
    <div class="row-12 text-center mb-1">
        <button class="btn-bd-primary letra-normal p-2 w-100 text-center d-block" type="button" (click)="cerrar()">
            Cerrar
        </button>
    </div>
</form>
